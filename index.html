<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ray - Creative DAW (Pro Edition v8 - Fixed)</title>
    <style>
        :root {
            --bg-main: #fff0f5; 
            --bg-dark: #ffe4e1; 
            --accent-pink: #ff69b4; 
            --text-dark: #4a4a4a;
            --white: #ffffff;
            --grid-line: rgba(255, 105, 180, 0.15);
            --grid-beat: rgba(255, 105, 180, 0.35);
            --grid-bar: rgba(255, 105, 180, 0.7);
            --playhead-color: #ff1493;
            --editor-height: 320px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--white);
            border-bottom: 2px solid var(--accent-pink);
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo { font-size: 24px; font-weight: bold; color: var(--accent-pink); letter-spacing: 2px; }
        .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .control-group {
            display: flex; align-items: center; gap: 5px;
            background: var(--white); padding: 4px 12px; border-radius: 20px;
            border: 1px solid var(--accent-pink); font-size: 12px;
        }

        button {
            background-color: var(--accent-pink); color: var(--white); border: none;
            padding: 5px 12px; border-radius: 15px; cursor: pointer; font-weight: bold;
        }
        button.active {
            background-color: #ff1493;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }

        input, select { border: 1px solid #ffb6c1; border-radius: 4px; padding: 2px; color: var(--text-dark); }

        .ruler-container {
            display: flex; height: 24px; background: var(--bg-dark);
            border-bottom: 1px solid var(--accent-pink); margin-left: 150px; position: relative;
            overflow: hidden; cursor: pointer;
        }
        .ruler-wrapper { position: absolute; left: 0; top: 0; height: 100%; display: flex; }
        .ruler-cell {
            position: absolute; height: 100%; font-size: 11px; font-weight: bold;
            color: #555; border-left: 2px solid var(--grid-bar); padding-left: 4px; display: flex; align-items: center;
            white-space: nowrap;
        }

        .timeline { flex: 1; display: flex; flex-direction: column; overflow-x: auto; overflow-y: hidden; position: relative; }
        .track-row { display: flex; height: 80px; border-bottom: 1px solid #ffdae0; position: relative; width: max-content; }
        .track-header {
            width: 150px; min-width: 150px; background: var(--white); position: sticky; left: 0;
            display: flex; flex-direction: column; justify-content: center; padding: 0 15px;
            border-right: 2px solid var(--accent-pink); font-weight: bold; z-index: 10;
        }
        .track-lane { position: relative; height: 100%; background-color: rgba(255,255,255,0.1); cursor: cell; background-repeat: repeat-x; }

        .playhead {
            position: absolute; top: 0; bottom: 0; width: 2px;
            background-color: var(--playhead-color); z-index: 50; pointer-events: none;
        }

        .midi-box {
            position: absolute; height: 70%; top: 15%;
            background: linear-gradient(45deg, #ff69b4, #ffb6c1);
            border: 2px solid var(--white); border-radius: 6px; color: var(--white);
            font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: flex-start;
            padding: 2px 8px; box-shadow: 0 2px 6px rgba(240, 98, 146, 0.3); cursor: grab;
            overflow: hidden;
        }
        .midi-box .box-title { width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .midi-box.selected { border-color: #ff1493; box-shadow: 0 0 10px #ff69b4; }
        .resizer-right {
            position: absolute; right: 0; top: 0; bottom: 0; width: 10px; cursor: ew-resize; background: rgba(0,0,0,0.05); z-index: 5;
        }
        
        .box-preview-canvas {
            position: absolute; bottom: 2px; left: 5px; right: 5px; height: 24px;
            pointer-events: none; opacity: 0.7;
        }

        .selection-marquee {
            position: absolute;
            border: 1px dashed #ff1493;
            background: rgba(255, 20, 147, 0.15);
            z-index: 40;
            pointer-events: none;
        }

        .editor-resize-handle {
            height: 6px; background: var(--bg-dark); cursor: ns-resize;
            border-top: 1px solid var(--accent-pink); border-bottom: 1px solid var(--accent-pink);
        }

        .editor-container { height: var(--editor-height); background: var(--white); display: flex; flex-direction: column; position: relative; }
        .tabs { display: flex; background: var(--bg-dark); border-bottom: 1px solid var(--accent-pink); justify-content: space-between; align-items: center; }
        .tab-group { display: flex; }
        .tab { padding: 8px 20px; cursor: pointer; font-weight: bold; color: var(--text-dark); font-size: 13px; }
        .tab.active { background: var(--white); color: var(--accent-pink); border-top: 2px solid var(--accent-pink); }
        .editor-title { font-size: 12px; font-weight: bold; color: var(--accent-pink); padding-right: 20px; }

        .editor-ruler {
            display: flex; height: 20px; background: #fafafa; border-bottom: 1px solid #ddd; margin-left: 70px; position: relative;
            overflow: hidden; cursor: pointer;
        }
        .editor-ruler-wrapper { position: absolute; left: 0; top: 0; height: 100%; display: flex; }

        .piano-roll { flex: 1; display: flex; overflow: auto; position: relative; }
        .keyboard { width: 70px; position: sticky; left: 0; z-index: 15; background: var(--white); border-right: 2px solid var(--accent-pink); }
        .key {
            height: 20px; border-bottom: 1px solid #eee; font-size: 9px;
            display: flex; align-items: center; justify-content: flex-end; padding-right: 5px; background: var(--white);
        }
        .key.black { background: #4a4a4a; color: var(--white); }
        
        .note-grid { position: absolute; left: 70px; top: 0; background-color: #fff; cursor: crosshair; background-repeat: repeat; }
        
        .grid-mask {
            position: absolute; top: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.08);
            pointer-events: none; z-index: 2;
        }
        .grid-mask.left { left: 0; }
        .grid-mask.right { right: 0; }

        .piano-note {
            position: absolute; height: 16px; background: var(--accent-pink);
            border: 1px solid var(--white); border-radius: 3px; opacity: 0.9; cursor: grab; z-index: 3;
        }
        .piano-note.selected {
            background: #ff1493;
            border-color: #fff;
            box-shadow: 0 0 8px #ff1493;
        }

        footer { background: var(--white); border-top: 1px solid var(--grid-line); padding: 6px 20px; font-size: 11px; color: #888; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Ray</div>
        <div class="controls">
            <div class="control-group">
                <button id="btn-play">▶ Play [Space]</button>
                <button id="btn-stop">■ Stop</button>
            </div>
            <div class="control-group">
                <button id="tool-pencil" class="active">✏️ 鉛筆ツール</button>
                <button id="tool-select">🔍 選択ツール</button>
            </div>
            <div class="control-group">
                <label>BPM:</label>
                <input type="number" id="tempo" value="120" style="width: 50px;">
            </div>
            <div class="control-group">
                <label>Quantize:</label>
                <select id="quantize" onchange="updateGridPattern()">
                    <option value="4">1/4 (四分音符)</option>
                    <option value="8">1/8 (八分音符)</option>
                    <option value="16" selected>1/16 (十六分音符)</option>
                    <option value="12">1/12 (四分三連符)</option>
                    <option value="24">1/24 (八分三連符)</option>
                    <option value="48">1/48 (十六分三連符)</option>
                </select>
            </div>
            <div class="control-group" style="border: none;">
                <span style="color:#aaa;">[Ctrl+Z]:戻る [Ctrl+C/V]:コピペ [Backspace]:消去</span>
            </div>
        </div>
    </header>

    <div class="ruler-container" id="ruler-container" onmousedown="setPlayheadByClick(event, true)">
        <div class="ruler-wrapper" id="ruler"></div>
    </div>

    <div class="timeline" id="timeline-area">
        <div class="playhead" id="timeline-playhead" style="left: 150px;"></div>
        
        <div class="track-row" data-part="drum"><div class="track-header">🥁 drum</div><div class="track-lane" onclick="handleLaneClick(this, 'drum', event)"></div></div>
        <div class="track-row" data-part="melody"><div class="track-header">🎹 melody</div><div class="track-lane" onclick="handleLaneClick(this, 'melody', event)"></div></div>
        <div class="track-row" data-part="chord"><div class="track-header">🎸 chords</div><div class="track-lane" onclick="handleLaneClick(this, 'chord', event)"></div></div>
        <div class="track-row" data-part="bass"><div class="track-header">🐟 bass</div><div class="track-lane" onclick="handleLaneClick(this, 'bass', event)"></div></div>
    </div>

    <div class="editor-resize-handle" id="editor-resizer"></div>

    <div class="editor-container" id="editor-container">
        <div class="tabs">
            <div class="tab-group">
                <div class="tab active" id="tab-drum" onclick="switchTab('drum')"> drum</div>
                <div class="tab" id="tab-melody" onclick="switchTab('melody')"> melody</div>
                <div class="tab" id="tab-chord" onclick="switchTab('chord')"> chords</div>
                <div class="tab" id="tab-bass" onclick="switchTab('bass')"> bass</div>
            </div>
            <div class="editor-title" id="current-box-title">選択中のボックス: なし</div>
        </div>

        <div class="editor-ruler" id="editor-ruler-container" onmousedown="setPlayheadByClick(event, false)">
            <div class="editor-ruler-wrapper" id="editor-ruler"></div>
        </div>

        <div class="piano-roll" id="editor-scroll">
            <div class="playhead" id="editor-playhead" style="left: 70px;"></div>
            <div class="keyboard" id="keyboard"></div>
            <div class="note-grid" id="note-grid" onmousedown="handleGridMouseDown(event)">
                <div id="mask-left" class="grid-mask left"></div>
                <div id="mask-right" class="grid-mask right"></div>
            </div>
        </div>
    </div>

    <footer>
        Space/Play | ルーラーをクリックでグリッド吸着移動 | [Shift+Scroll]:横移動 | 二本指ピンチ:ズーム
    </footer>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function createNoiseBuffer() {
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            return buffer;
        }
        const noiseBuffer = createNoiseBuffer();

        function playTone(freq, duration, part='melody', noteName='') {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;

            if(part === 'drum') {
                if (noteName === 'Snare' || noteName === 'F3' || noteName === 'G3' || noteName === 'A3' || noteName === 'B3') {
                    const noiseNode = audioCtx.createBufferSource();
                    noiseNode.buffer = noiseBuffer;
                    const noiseFilter = audioCtx.createBiquadFilter();
                    noiseFilter.type = 'bandpass'; noiseFilter.frequency.value = 1500;
                    const noiseGain = audioCtx.createGain();
                    noiseGain.gain.setValueAtTime(0.4, now);
                    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    noiseNode.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination);

                    const osc = audioCtx.createOscillator();
                    const oscGain = audioCtx.createGain();
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(180, now);
                    osc.frequency.linearRampToValueAtTime(100, now + 0.08);
                    oscGain.gain.setValueAtTime(0.3, now);
                    oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    osc.connect(oscGain); oscGain.connect(audioCtx.destination);

                    noiseNode.start(now); noiseNode.stop(now + 0.16);
                    osc.start(now); osc.stop(now + 0.11);
                } else if (noteName === 'Kick' || noteName === 'C3' || noteName === 'D3' || noteName === 'E3' || noteName === 'F2') { 
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.1);
                    gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                    osc.start(now); osc.stop(now + 0.12);
                } else if (noteName === 'Hi-Hat' || noteName === 'C4' || noteName === 'D4' || noteName === 'E4') {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'square'; osc.frequency.setValueAtTime(10000, now);
                    gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.04);
                    osc.start(now); osc.stop(now + 0.04);
                } else if (noteName === 'Open HH' || noteName === 'G4' || noteName === 'A4' || noteName === 'B4') {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'square'; osc.frequency.setValueAtTime(9000, now);
                    gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now); osc.stop(now + 0.25);
                }
                return;
            }

            if(part === 'melody' || part === 'chord') {
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc1.type = 'triangle'; osc2.type = 'sine';
                osc1.frequency.setValueAtTime(freq, now);
                osc2.frequency.setValueAtTime(freq * 2, now);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.1, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
                osc1.start(now); osc2.start(now + duration);
                osc1.stop(now + duration); osc2.stop(now + duration);
                return;
            }

            if(part === 'bass') {
                const osc = audioCtx.createOscillator();
                const filter = audioCtx.createBiquadFilter();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(freq, now);
                filter.type = 'lowpass'; filter.frequency.setValueAtTime(250, now);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + duration);
                return;
            }
        }

        const noteNames = ['B', 'A#', 'A', 'G#', 'G', 'F#', 'F', 'E', 'D#', 'D', 'C#', 'C'];
        const octaves = [4, 3, 2];
        const drumNotes = ['Open HH', 'Hi-Hat', 'Snare', 'Kick'];
        
        let freqMap = []; 
        let totalKeys = 0;
        let zoomScale = 1.0; 
        let currentMaxBars = 50; 

        const keyboardEl = document.getElementById('keyboard');
        const gridEl = document.getElementById('note-grid');
        const timelineArea = document.getElementById('timeline-area');
        const editorScroll = document.getElementById('editor-scroll');

        octaves.forEach(oct => {
            noteNames.forEach(name => {
                freqMap.push({ name: name+oct, freq: 493.88 * Math.pow(2, -totalKeys/12) });
                totalKeys++;
            });
        });

        let boxRegistry = {}; 
        let currentSelectedBoxId = null;
        let currentPart = 'drum';
        let currentTool = 'pencil'; 
        let boxCounter = 0;
        let isPlaying = false;
        let playX = 0; 
        let lastFrameTime = 0;
        let isResizingActive = false;

        let undoStack = [];

        function saveHistory() {
            if (!currentSelectedBoxId || !boxRegistry[currentSelectedBoxId]) return;
            const snapshot = JSON.stringify(boxRegistry[currentSelectedBoxId].notes);
            undoStack.push({ boxId: currentSelectedBoxId, notes: snapshot });
            if (undoStack.length > 50) undoStack.shift();
        }

        function triggerUndo() {
            if (undoStack.length === 0) return;
            const previousState = undoStack.pop();
            if (boxRegistry[previousState.boxId]) {
                boxRegistry[previousState.boxId].notes = JSON.parse(previousState.notes);
                if (currentSelectedBoxId === previousState.boxId) {
                    refreshEditorContainer();
                }
            }
        }

        let noteClipboard = [];

        function getStepWidth() {
            const q = parseInt(document.getElementById('quantize').value) || 16;
            return (320 * zoomScale) / q;
        }

        function ensureTimelineLength(targetInternalX) {
            const barWidthInternal = 320;
            const targetBarIdx = Math.floor(targetInternalX / barWidthInternal) + 4; 
            if (targetBarIdx > currentMaxBars) {
                currentMaxBars = targetBarIdx;
                updateGridPattern();
            }
        }

        function generateGridImage(rowHeight) {
            const q = parseInt(document.getElementById('quantize').value) || 16;
            const barW = 320 * zoomScale;
            const beatW = 80 * zoomScale;
            const qW = barW / q;

            const canvas = document.createElement('canvas');
            canvas.width = barW;
            canvas.height = rowHeight;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, barW, rowHeight);

            ctx.strokeStyle = '#eee';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, rowHeight - 1);
            ctx.lineTo(barW, rowHeight - 1);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(255, 105, 180, 0.18)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 0; i < barW; i += qW) {
                ctx.moveTo(i, 0); ctx.lineTo(i, rowHeight);
            }
            ctx.stroke();

            ctx.strokeStyle = 'rgba(255, 105, 180, 0.4)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            for (let i = 0; i < barW; i += beatW) {
                ctx.moveTo(i, 0); ctx.lineTo(i, rowHeight);
            }
            ctx.stroke();

            ctx.strokeStyle = 'rgba(255, 105, 180, 0.75)';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(0, 0); ctx.lineTo(0, rowHeight);
            ctx.stroke();

            return canvas.toDataURL();
        }

        function updateGridPattern() {
            const currentW = (currentMaxBars * 320) * zoomScale;
            gridEl.style.width = `${currentW}px`;
            
            const rowHeight = currentPart === 'drum' ? 40 : 20;
            const gridDataUrl = generateGridImage(rowHeight);
            gridEl.style.backgroundImage = `url(${gridDataUrl})`;
            gridEl.style.backgroundSize = `${320 * zoomScale}px ${rowHeight}px`;

            const laneCanvas = document.createElement('canvas');
            laneCanvas.width = 320 * zoomScale;
            laneCanvas.height = 80;
            const lCtx = laneCanvas.getContext('2d');
            lCtx.fillStyle = '#ffffff';
            lCtx.fillRect(0, 0, 320 * zoomScale, 80);
            
            lCtx.strokeStyle = 'rgba(255, 105, 180, 0.3)';
            lCtx.lineWidth = 1.5;
            lCtx.beginPath();
            for(let i=0; i<320*zoomScale; i+=80*zoomScale) {
                lCtx.moveTo(i, 0); lCtx.lineTo(i, 80);
            }
            lCtx.stroke();

            lCtx.strokeStyle = 'rgba(255, 105, 180, 0.75)';
            lCtx.lineWidth = 2.5;
            lCtx.beginPath();
            lCtx.moveTo(0,0); lCtx.lineTo(0,80);
            lCtx.stroke();
            
            document.querySelectorAll('.track-lane').forEach(lane => {
                lane.style.width = `${currentW}px`;
                lane.style.backgroundImage = `url(${laneCanvas.toDataURL()})`;
                lane.style.backgroundSize = `${320 * zoomScale}px 80px`;
            });

            document.getElementById('ruler').style.width = `${currentW}px`;
            document.getElementById('editor-ruler').style.width = `${currentW}px`;

            initRulers();
            renderKeyboard();
            refreshAllBoxesUI();
            updatePlayheadUI();
            updateEditorMasks();
        }

        function initRulers() {
            const rEl = document.getElementById('ruler');
            const edREl = document.getElementById('editor-ruler');
            rEl.innerHTML = ''; edREl.innerHTML = '';
            const currentBarWidth = 320 * zoomScale;
            for (let i = 1; i <= currentMaxBars; i++) {
                const c1 = document.createElement('div'); c1.classList.add('ruler-cell');
                c1.style.left = `${(i - 1) * currentBarWidth}px`; c1.innerText = `${i}`;
                rEl.appendChild(c1);

                const c2 = document.createElement('div'); c2.classList.add('ruler-cell');
                c2.style.left = `${(i - 1) * currentBarWidth}px`; c2.innerText = `${i} 小節`;
                edREl.appendChild(c2);
            }
        }

        function renderKeyboard() {
            keyboardEl.innerHTML = '';
            if(currentPart === 'drum') {
                gridEl.style.height = `${drumNotes.length * 40}px`;
                drumNotes.forEach(name => {
                    const key = document.createElement('div'); key.classList.add('key', 'drum-key');
                    key.style.height = '40px'; key.innerText = name; keyboardEl.appendChild(key);
                });
            } else {
                gridEl.style.height = `${totalKeys * 20}px`;
                octaves.forEach(oct => {
                    noteNames.forEach(name => {
                        const key = document.createElement('div'); key.classList.add('key'); key.style.height = '20px';
                        if(name.includes('#')) key.classList.add('black');
                        key.innerText = name + oct; keyboardEl.appendChild(key);
                    });
                });
            }
        }

        function updateEditorMasks() {
            const maskL = document.getElementById('mask-left');
            const maskR = document.getElementById('mask-right');
            if(!currentSelectedBoxId || !boxRegistry[currentSelectedBoxId]) {
                maskL.style.width = '0px'; maskR.style.left = '0px'; maskR.style.width = '100%'; return;
            }
            const box = boxRegistry[currentSelectedBoxId];
            const leftPx = box.x * zoomScale;
            const widthPx = box.w * zoomScale;
            const totalW = (currentMaxBars * 320) * zoomScale;

            maskL.style.left = '0px'; maskL.style.width = `${leftPx}px`;
            maskR.style.left = `${leftPx + widthPx}px`; maskR.style.width = `${totalW - (leftPx + widthPx)}px`;
        }

        function checkAndAdjustBoxPosition(boxId, part, targetX, targetW) {
            let x = Math.max(0, targetX);
            let w = targetW;
            const siblings = Object.values(boxRegistry).filter(b => b.part === part && b.id !== boxId);
            for (let sibling of siblings) {
                if (x < sibling.x && x + w > sibling.x) {
                    w = sibling.x - x; 
                }
            }
            for (let sibling of siblings) {
                if (x >= sibling.x && x < sibling.x + sibling.w) {
                    x = sibling.x + sibling.w; 
                }
            }
            return { x, w };
        }

        function handleLaneClick(lane, part, event) {
            if (event.target !== lane || isResizingActive) return;

            boxCounter++;
            const boxId = `box-${boxCounter}`;
            const rect = lane.getBoundingClientRect();
            const clickX = (event.clientX - rect.left + timelineArea.scrollLeft) / zoomScale;
            
            const step = getStepWidth() / zoomScale;
            let alignedX = Math.floor(clickX / step) * step;
            let defaultWidth = 320; 

            ensureTimelineLength(alignedX + defaultWidth);

            const clamped = checkAndAdjustBoxPosition(boxId, part, alignedX, defaultWidth);
            if (clamped.w < step) {
                boxCounter--;
                return;
            }

            boxRegistry[boxId] = {
                id: boxId, part: part, x: clamped.x, w: clamped.w,
                name: `${part.toUpperCase()}-${boxCounter}`, notes: []
            };

            const box = document.createElement('div');
            box.classList.add('midi-box'); box.id = boxId;
            box.style.left = `${clamped.x * zoomScale}px`;
            box.style.width = `${clamped.w * zoomScale}px`;
            
            const titleSpan = document.createElement('span'); titleSpan.classList.add('box-title');
            box.appendChild(titleSpan);

            const previewCanvas = document.createElement('canvas'); previewCanvas.classList.add('box-preview-canvas');
            box.appendChild(previewCanvas);

            box.addEventListener('mousedown', (e) => makeDraggable(e, box, boxRegistry[boxId], true));
            box.addEventListener('click', (e) => { e.stopPropagation(); selectBox(boxId); });
            
            box.oncontextmenu = (e) => { 
                e.preventDefault(); delete boxRegistry[boxId]; box.remove(); 
                if(currentSelectedBoxId===boxId) selectBox(null); 
            };

            const resizer = document.createElement('div'); resizer.classList.add('resizer-right');
            resizer.addEventListener('mousedown', (e) => makeResizable(e, box, boxRegistry[boxId], true));
            box.appendChild(resizer);

            lane.appendChild(box);
            selectBox(boxId);
            updateBoxUI(boxRegistry[boxId]);
        }

        function updateBoxUI(boxData) {
            const boxEl = document.getElementById(boxData.id);
            if(!boxEl) return;
            boxEl.style.left = `${boxData.x * zoomScale}px`;
            boxEl.style.width = `${boxData.w * zoomScale}px`;
            boxEl.querySelector('.box-title').innerText = boxData.name;
            drawMiniPreview(boxData, boxEl.querySelector('.box-preview-canvas'));
        }

        function refreshAllBoxesUI() {
            Object.values(boxRegistry).forEach(updateBoxUI);
        }

        function drawMiniPreview(boxData, canvas) {
            if(!canvas) return;
            canvas.width = Math.max(boxData.w * zoomScale, 50); canvas.height = 24;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';

            const maxRow = boxData.part === 'drum' ? 4 : totalKeys;
            boxData.notes.forEach(note => {
                const nx = (note.x / boxData.w) * canvas.width;
                const nw = (note.w / boxData.w) * canvas.width;
                const rowIdx = boxData.part === 'drum' ? Math.floor(note.y / 40) : Math.floor(note.y / 20);
                ctx.fillRect(nx, (rowIdx / maxRow) * canvas.height, Math.max(nw - 1, 2), 2);
            });
        }

        function makeDraggable(e, element, dataObj, isBox) {
            if (e.target.classList.contains('resizer-right')) return;
            e.stopPropagation();
            
            if (!isBox && currentTool === 'select') return; 
            if (!isBox) saveHistory(); 

            let startX = e.clientX;
            let startY = e.clientY;
            let initialX = dataObj.x;
            let initialY = dataObj.y || 0;
            const step = getStepWidth() / zoomScale; 

            function onMove(me) {
                let dx = (me.clientX - startX) / zoomScale;
                let newX = Math.max(0, Math.round((initialX + dx) / step) * step);

                if (isBox) {
                    ensureTimelineLength(newX + dataObj.w); 
                    const clamped = checkAndAdjustBoxPosition(dataObj.id, dataObj.part, newX, dataObj.w);
                    dataObj.x = clamped.x;
                    element.style.left = `${clamped.x * zoomScale}px`;
                    updateEditorMasks();
                } else {
                    const parentBox = boxRegistry[currentSelectedBoxId];
                    if(newX < 0) newX = 0;
                    if(newX + dataObj.w > parentBox.w) newX = parentBox.w - dataObj.w;
                    
                    dataObj.x = newX;
                    element.style.left = `${(parentBox.x + newX) * zoomScale}px`;

                    let dy = me.clientY - startY;
                    const rH = currentPart === 'drum' ? 40 : 20;
                    const maxH = currentPart === 'drum' ? drumNotes.length * 40 : totalKeys * 20;
                    let newY = Math.max(0, Math.min(maxH - rH, Math.floor((initialY + dy) / rH) * rH));
                    element.style.top = `${newY + 2}px`;
                    dataObj.y = newY;
                }
            }

            function onEnd() {
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onEnd);
                if(!isBox) triggerNoteSound(dataObj.y);
                else updateBoxUI(dataObj);
            }
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
        }

        function makeResizable(e, element, dataObj, isBox) {
            e.stopPropagation();
            isResizingActive = true;
            if (!isBox) saveHistory(); 
            
            let startX = e.clientX;
            let startW = dataObj.w;
            const step = getStepWidth() / zoomScale;

            function onMove(me) {
                let dx = (me.clientX - startX) / zoomScale;
                let newW = Math.max(step, Math.round((startW + dx) / step) * step);

                if(isBox) {
                    ensureTimelineLength(dataObj.x + newW); 
                    const clamped = checkAndAdjustBoxPosition(dataObj.id, dataObj.part, dataObj.x, newW);
                    dataObj.w = clamped.w; 
                    element.style.width = `${clamped.w * zoomScale}px`;
                    updateEditorMasks();
                } else {
                    const parentBox = boxRegistry[currentSelectedBoxId];
                    if(dataObj.x + newW > parentBox.w) newW = parentBox.w - dataObj.x;
                    dataObj.w = newW; element.style.width = `${newW * zoomScale - 2}px`;
                }
            }

            function onEnd() {
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onEnd);
                setTimeout(() => { isResizingActive = false; }, 60);
                if(isBox) updateBoxUI(dataObj);
                else if(currentSelectedBoxId) updateBoxUI(boxRegistry[currentSelectedBoxId]);
            }
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
        }

        function triggerNoteSound(yPosition) {
            if (currentPart === 'drum') {
                const idx = Math.floor(yPosition / 40);
                if (drumNotes[idx]) playTone(0, 0.2, 'drum', drumNotes[idx]);
            } else {
                const noteInfo = freqMap[Math.floor(yPosition / 20)];
                if(noteInfo) playTone(noteInfo.freq, 0.2, currentPart, noteInfo.name);
            }
        }

        function handleGridMouseDown(e) {
            if (!currentSelectedBoxId || isResizingActive) return;
            if (e.target !== gridEl) return;

            const rect = gridEl.getBoundingClientRect();
            // ★重要：内部絶対X座標（スクロール考慮）を正しく計算
            const startGridX = (e.clientX - rect.left) / zoomScale;
            const startGridY = e.clientY - rect.top;
            const parentBox = boxRegistry[currentSelectedBoxId];

            if (currentTool === 'pencil') {
                if (startGridX < parentBox.x || startGridX >= (parentBox.x + parentBox.w)) return;
                saveHistory(); 

                const step = 320 / (parseInt(document.getElementById('quantize').value) || 16);
                const clickXInsideBox = startGridX - parentBox.x;
                const noteXInside = Math.floor(clickXInsideBox / step) * step; 
                
                const rowH = currentPart === 'drum' ? 40 : 20;
                const gridY = Math.floor(startGridY / rowH) * rowH;

                const noteId = `note-${Date.now()}`;
                const newNote = { id: noteId, x: noteXInside, y: gridY, w: step, selected: false };

                parentBox.notes.push(newNote);
                const noteEl = drawNote(newNote);
                triggerNoteSound(gridY);

                function onPencilDrag(me) {
                    const currentRect = gridEl.getBoundingClientRect();
                    const currentGridX = (me.clientX - currentRect.left) / zoomScale;
                    const insideXEnd = Math.max(noteXInside + step, currentGridX - parentBox.x);
                    let newW = Math.floor(insideXEnd / step) * step - noteXInside;
                    if (newW < step) newW = step;
                    if (noteXInside + newW > parentBox.w) newW = parentBox.w - noteXInside;
                    
                    newNote.w = newW;
                    if (noteEl) noteEl.style.width = `${newW * zoomScale - 2}px`;
                }

                function onPencilUp() {
                    window.removeEventListener('mousemove', onPencilDrag);
                    window.removeEventListener('mouseup', onPencilUp);
                    updateBoxUI(parentBox); 
                }
                window.addEventListener('mousemove', onPencilDrag);
                window.addEventListener('mouseup', onPencilUp);

            } else if (currentTool === 'select') {
                e.preventDefault();
                if (!e.shiftKey) {
                    parentBox.notes.forEach(n => n.selected = false);
                    document.querySelectorAll('.piano-note').forEach(el => el.classList.remove('selected'));
                }

                const marquee = document.createElement('div');
                marquee.classList.add('selection-marquee');
                gridEl.appendChild(marquee);

                function onSelectDrag(me) {
                    const currentRect = gridEl.getBoundingClientRect();
                    const currentGridX = (me.clientX - currentRect.left) / zoomScale;
                    const currentGridY = me.clientY - currentRect.top;

                    // ズームスケールに基づいた内部座標系での矩形作成
                    const x = Math.min(startGridX, currentGridX);
                    const y = Math.min(startGridY, currentGridY);
                    const w = Math.abs(startGridX - currentGridX);
                    const h = Math.abs(startGridY - currentGridY);

                    // 画面表示用にスケールを戻して適用
                    marquee.style.left = `${x * zoomScale}px`; marquee.style.top = `${y}px`;
                    marquee.style.width = `${w * zoomScale}px`; marquee.style.height = `${h}px`;

                    parentBox.notes.forEach(note => {
                        const noteAbsX = parentBox.x + note.x;
                        const noteAbsY = note.y;
                        const noteWidth = note.w;
                        const noteHeight = currentPart === 'drum' ? 40 : 20;

                        const isOverlapping = (
                            x < noteAbsX + noteWidth && x + w > noteAbsX &&
                            y < noteAbsY + noteHeight && y + h > noteAbsY
                        );

                        note.selected = isOverlapping;
                        const noteEl = document.getElementById(note.id);
                        if (noteEl) {
                            if (note.selected) noteEl.classList.add('selected');
                            else noteEl.classList.remove('selected');
                        }
                    });
                }

                function onSelectUp() {
                    marquee.remove();
                    window.removeEventListener('mousemove', onSelectDrag);
                    window.removeEventListener('mouseup', onSelectUp);
                }
                window.addEventListener('mousemove', onSelectDrag);
                window.addEventListener('mouseup', onSelectUp);
            }
        }

        function drawNote(noteData) {
            const parentBox = boxRegistry[currentSelectedBoxId];
            if(!parentBox) return null;

            const note = document.createElement('div');
            note.classList.add('piano-note'); note.id = noteData.id;
            
            const absoluteX = (parentBox.x + noteData.x) * zoomScale;
            note.style.left = `${absoluteX}px`;
            note.style.top = `${noteData.y + 2}px`;
            note.style.width = `${noteData.w * zoomScale - 2}px`;
            note.style.height = `${currentPart === 'drum' ? 36 : 16}px`;
            if (noteData.selected) note.classList.add('selected');
            
            note.addEventListener('mousedown', (e) => {
                if (currentTool === 'select') {
                    e.stopPropagation();
                    noteData.selected = !noteData.selected;
                    note.classList.toggle('selected');
                } else {
                    makeDraggable(e, note, noteData, false);
                }
            });

            note.oncontextmenu = (e) => {
                e.preventDefault(); e.stopPropagation();
                if (currentTool !== 'pencil') return;
                saveHistory();
                parentBox.notes = parentBox.notes.filter(n => n.id !== noteData.id);
                note.remove(); updateBoxUI(parentBox);
            };

            const resizer = document.createElement('div'); resizer.classList.add('resizer-right');
            resizer.addEventListener('mousedown', (e) => {
                if (currentTool === 'pencil') makeResizable(e, note, noteData, false);
            });
            note.appendChild(resizer);

            gridEl.appendChild(note);
            return note;
        }

        function refreshEditorContainer() {
            gridEl.querySelectorAll('.piano-note').forEach(n => n.remove());
            if (currentSelectedBoxId && boxRegistry[currentSelectedBoxId]) {
                boxRegistry[currentSelectedBoxId].notes.forEach(drawNote);
            }
            updateEditorMasks();
        }

        function selectBox(boxId) {
            currentSelectedBoxId = boxId;
            document.querySelectorAll('.midi-box').forEach(b => b.classList.remove('selected'));

            if (boxId && boxRegistry[boxId]) {
                const box = boxRegistry[boxId];
                document.getElementById(boxId).classList.add('selected');
                currentPart = box.part;
                document.getElementById('current-box-title').innerText = `編集中のボックス: ${box.name}`;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.getElementById(`tab-${currentPart}`).classList.add('active');
            } else {
                document.getElementById('current-box-title').innerText = `選択中のボックス: なし`;
            }
            updateGridPattern(); 
            refreshEditorContainer();
        }

        function switchTab(part) {
            const found = Object.values(boxRegistry).find(b => b.part === part);
            currentPart = part;
            selectBox(found ? found.id : null);
        }

        function setPlayheadByClick(e, isTimeline) {
            const container = isTimeline ? document.getElementById('ruler-container') : document.getElementById('editor-ruler-container');
            const rect = container.getBoundingClientRect();
            const scrollLeft = isTimeline ? timelineArea.scrollLeft : editorScroll.scrollLeft;
            
            const containerLeftAbsolute = rect.left;
            const clickXInContainer = e.clientX - containerLeftAbsolute + scrollLeft;
            
            const step = getStepWidth() / zoomScale; 
            let alignedX = Math.round((clickXInContainer / zoomScale) / step) * step; 
            
            playX = Math.max(0, alignedX); 

            ensureTimelineLength(playX);

            if(isPlaying) {
                const bpm = parseFloat(document.getElementById('tempo').value) || 120;
                playheadTime = (playX / 80) * (60.0 / bpm);
            }

            updatePlayheadUI();
        }

        function updatePlayheadUI() {
            const currentSmoothPlayX = playX * zoomScale; 
            document.getElementById('timeline-playhead').style.left = `${currentSmoothPlayX + 150}px`;
            document.getElementById('editor-playhead').style.left = `${currentSmoothPlayX + 70}px`; 
        }

        let playheadTime = 0.0; 

        function togglePlay() {
            isPlaying = !isPlaying;
            document.getElementById('btn-play').innerText = isPlaying ? "⏸ Pause [Space]" : "▶ Play [Space]";
            if(isPlaying) {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                
                const bpm = parseFloat(document.getElementById('tempo').value) || 120;
                const secondsPerBeat = 60.0 / bpm;
                
                const currentBeat = playX / 80; 
                playheadTime = currentBeat * secondsPerBeat; 
                
                lastFrameTime = performance.now();
                requestAnimationFrame(playLoop);
            }
        }

        function playLoop(now) {
            if (!isPlaying) return;
            const delta = (now - lastFrameTime) / 1000; 
            lastFrameTime = now;

            const bpm = parseFloat(document.getElementById('tempo').value) || 120;
            const secondsPerBeat = 60.0 / bpm;

            const prevTime = playheadTime;
            playheadTime += delta;
            playX = (playheadTime / secondsPerBeat) * 80; 

            ensureTimelineLength(playX);
            updatePlayheadUI(); 

            Object.values(boxRegistry).forEach(box => {
                box.notes.forEach(note => {
                    const absNoteX = box.x + note.x;
                    const noteBeat = absNoteX / 80;
                    const noteTime = noteBeat * secondsPerBeat;

                    if (noteTime >= prevTime && noteTime < playheadTime) {
                        const duration = (note.w / 80) * secondsPerBeat;
                        if(box.part === 'drum') {
                            const rowIdx = Math.floor(note.y / 40);
                            const drumName = drumNotes[rowIdx];
                            playTone(0, duration, 'drum', drumName);
                        } else {
                            const noteInfo = freqMap[Math.floor(note.y / 20)];
                            if(noteInfo) playTone(noteInfo.freq, duration, box.part, noteInfo.name);
                        }
                    }
                });
            });

            requestAnimationFrame(playLoop);
        }

        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') { e.preventDefault(); togglePlay(); return; }

            const parentBox = boxRegistry[currentSelectedBoxId];

            if ((e.key === 'Backspace' || e.key === 'Delete') && parentBox) {
                const selectedNotes = parentBox.notes.filter(n => n.selected);
                if (selectedNotes.length > 0) {
                    e.preventDefault(); saveHistory(); 
                    parentBox.notes = parentBox.notes.filter(n => !n.selected);
                    refreshEditorContainer();
                }
                return;
            }

            if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z') {
                e.preventDefault(); triggerUndo(); return;
            }

            if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'c' && parentBox) {
                const targets = parentBox.notes.filter(n => n.selected);
                if (targets.length > 0) {
                    e.preventDefault();
                    const minX = Math.min(...targets.map(n => n.x));
                    noteClipboard = targets.map(n => ({ y: n.y, xOffset: n.x - minX, w: n.w }));
                }
                return;
            }

            if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'v' && parentBox) {
                if (noteClipboard.length > 0) {
                    e.preventDefault(); saveHistory(); 
                    let pasteBaseXInside = playX - parentBox.x;
                    const step = 320 / (parseInt(document.getElementById('quantize').value) || 16);
                    pasteBaseXInside = Math.floor(pasteBaseXInside / step) * step;

                    parentBox.notes.forEach(n => n.selected = false);

                    noteClipboard.forEach(clip => {
                        const targetX = pasteBaseXInside + clip.xOffset;
                        if (targetX >= 0 && targetX < parentBox.w) {
                            const newNoteId = `note-${Date.now()}-${Math.random()}`;
                            parentBox.notes.push({ id: newNoteId, x: targetX, y: clip.y, w: clip.w, selected: true });
                        }
                    });
                    refreshEditorContainer();
                    updateBoxUI(parentBox);
                }
                return;
            }
        });

        // ★ツール切り替え＆クラス付与の完全紐付け
        document.getElementById('tool-pencil').addEventListener('click', () => {
            currentTool = 'pencil';
            document.getElementById('tool-pencil').classList.add('active');
            document.getElementById('tool-select').classList.remove('active');
            gridEl.style.cursor = "crosshair";
        });
        document.getElementById('tool-select').addEventListener('click', () => {
            currentTool = 'select';
            document.getElementById('tool-select').classList.add('active');
            document.getElementById('tool-pencil').classList.remove('active');
            gridEl.style.cursor = "default";
        });

        document.getElementById('btn-play').addEventListener('click', togglePlay);
        // ★ストップ時に再生フラグを折り、位置を「0」に戻して画面を更新
        document.getElementById('btn-stop').addEventListener('click', () => { 
            isPlaying = false; 
            playX = 0; 
            playheadTime = 0; 
            updatePlayheadUI(); 
            document.getElementById('btn-play').innerText = "▶ Play [Space]"; 
        });

        function handleShiftScroll(e, element) {
            if (e.shiftKey || e.deltaX !== 0) {
                e.preventDefault();
                element.scrollLeft += e.deltaX !== 0 ? e.deltaX : e.deltaY;
                
                if (element.scrollLeft + element.clientWidth > element.scrollWidth - 400) {
                    currentMaxBars += 10;
                    updateGridPattern();
                }
            }
        }
        timelineArea.addEventListener('wheel', (e) => handleShiftScroll(e, timelineArea), { passive: false });
        editorScroll.addEventListener('wheel', (e) => handleShiftScroll(e, editorScroll), { passive: false });

        timelineArea.addEventListener('scroll', () => {
            document.getElementById('ruler').style.transform = `translateX(-${timelineArea.scrollLeft}px)`;
        });
        editorScroll.addEventListener('scroll', () => {
            document.getElementById('editor-ruler').style.transform = `translateX(-${editorScroll.scrollLeft}px)`;
        });

        let startDist = 0, startScale = 1.0, isPinching = false;
        function getDistance(t1, t2) { return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY); }
        function handleTouchStart(e) { if (e.touches.length === 2) { isPinching = true; startDist = getDistance(e.touches[0], e.touches[1]); startScale = zoomScale; } }
        function handleTouchMove(e) {
            if (isPinching && e.touches.length === 2) {
                e.preventDefault();
                zoomScale = Math.max(0.5, Math.min(3.0, startScale * (getDistance(e.touches[0], e.touches[1]) / startDist)));
                updateGridPattern(); refreshEditorContainer();
            }
        }
        function handleTouchEnd(e) { if (e.touches.length < 2) isPinching = false; }

        [timelineArea, editorScroll].forEach(el => {
            el.addEventListener('touchstart', handleTouchStart, {passive: false});
            el.addEventListener('touchmove', handleTouchMove, {passive: false});
            el.addEventListener('touchend', handleTouchEnd);
        });

        const resizerHandle = document.getElementById('editor-resizer');
        const editorContainer = document.getElementById('editor-container');
        resizerHandle.addEventListener('mousedown', startHandler);
        resizerHandle.addEventListener('touchstart', startHandler, {passive: false});

        function startHandler(e) {
            e.preventDefault();
            const isTouch = e.type.startsWith('touch');
            const moveEvent = isTouch ? 'touchmove' : 'mousemove';
            const endEvent = isTouch ? 'touchend' : 'mouseup';
            const onMove = (me) => {
                const clientY = isTouch ? me.touches[0].clientY : me.clientY;
                const newHeight = window.innerHeight - clientY;
                if(newHeight > 120 && newHeight < window.innerHeight * 0.7) editorContainer.style.setProperty('--editor-height', `${newHeight}px`);
            };
            const onUp = () => { window.removeEventListener(moveEvent, onMove); window.removeEventListener(endEvent, onUp); };
            window.addEventListener(moveEvent, onMove, {passive: false}); window.addEventListener(endEvent, onUp);
        }

        selectBox(null);
    </script>
</body>
